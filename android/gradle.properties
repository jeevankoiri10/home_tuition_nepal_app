org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Kotlin incremental compilation can corrupt its on-disk caches on Windows
# ("Could not close incremental caches ... is already registered"), failing the
# build after a clean. Disabling it trades a little rebuild speed for reliability.
kotlin.incremental=false
