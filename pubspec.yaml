name: home_tuition_nepal_app
description: "Home Tuition Nepal — by KTM academy. Locality-first tutor marketplace for Nepal."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Phase 1 — Foundation
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7
  get_it: ^8.0.3
  go_router: ^16.0.0
  shared_preferences: ^2.5.2
  intl: any

  # Phase 2 — Auth & profiles
  supabase_flutter: ^2.8.0

  # Phase 4 — Map view + locality search
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2

  # Opens the tutor's CV PDF in the OS's built-in PDF viewer (Phase 9).
  url_launcher: ^6.3.1

  # CV upload during tutor onboarding (Phase 19).
  file_picker: ^8.1.4

  # eSewa payment QR rendered in the top-up sheet (Phase 20).
  qr_flutter: ^4.1.0

  # Phase 14 — Observability
  sentry_flutter: ^8.10.0

  # Typography — Noto Sans Devanagari fetched at runtime, no bundled .ttf assets.
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

  # Devanagari support for Nepali is loaded at runtime via the google_fonts package
  # (see lib/core/theme/app_text_styles.dart). No font files are bundled.
